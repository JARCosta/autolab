<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoLab - CS2 Custom</title>
  <link rel="stylesheet" href="{{ url_for('boost.static', filename='boost.css', v=asset_version) }}">
</head>
<body>
  <div class="notif"><div class="notif-inner" id="notif"></div></div>

  <div class="app-shell">
    <aside class="sidebar">
      <button class="create-btn" id="create-btn" disabled>
        Create Custom <span class="create-count" id="create-count"></span>
      </button>

      <h2>Players</h2>
      <div class="roster" id="roster"></div>
      <div class="add-row">
        <input type="text" id="add-name" placeholder="New player" maxlength="24">
        <button id="add-btn">+ Add</button>
      </div>
    </aside>

    <div class="main">
      <nav><a href="/">&larr; AutoLab</a></nav>
      <h1>CS2 Custom</h1>
      <div id="matches"></div>
    </div>
  </div>

  <script src="{{ url_for('boost.static', filename='boost.js', v=asset_version) }}"></script>
</body>
</html>
