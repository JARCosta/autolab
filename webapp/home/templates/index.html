<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoLab</title>
  <link rel="stylesheet" href="{{ url_for('home.static', filename='home.css', v=asset_version) }}">
</head>
<body>
  <div class="container">
    <h1>AutoLab</h1>
    <p class="subtitle">StreamElements, monitoring and CS2 custom tools</p>
    <div class="grid">
      <a class="card" href="/balances">
        <div class="card-icon green">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M1 12L5 6L9 9L15 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="card-title">StreamElements</div>
        <div class="card-desc">Track bettor balances and history across Twitch channels.</div>
      </a>

      <a class="card" href="/monitor">
        <div class="card-icon blue">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="1" y="3" width="14" height="10" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
            <path d="M4 9L6 7L8 8.5L12 5.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="card-title">Hardware Monitor</div>
        <div class="card-desc">CPU load, clock speed, and temperature over time.</div>
      </a>

      <a class="card" href="/boost">
        <div class="card-icon orange">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M8 1L10 6H15L11 9.5L12.5 15L8 11.5L3.5 15L5 9.5L1 6H6L8 1Z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="card-title">CS2 Custom</div>
        <div class="card-desc">Closed-server 5v5: ELO, balanced teams, and match history.</div>
      </a>
    </div>
  </div>
</body>
</html>
