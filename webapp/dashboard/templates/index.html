<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoLab — Balances</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/luxon@3/build/global/luxon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 1.5rem;
    }
    nav a {
      color: #888;
      text-decoration: none;
      font-size: 0.85rem;
    }
    nav a:hover { color: #bbb; }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 0.75rem 0 1.25rem;
    }

    .table-box {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 0.5rem;
      overflow: hidden;
    }
    table {
      border-collapse: collapse;
      width: 100%;
    }
    th, td {
      padding: 0.6rem 0.85rem;
      text-align: left;
      border-bottom: 1px solid #222;
    }
    th {
      background: #161616;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
    }
    tbody tr { transition: background 0.1s; }
    tbody tr:hover { background: #222; }
    tbody tr:last-child td { border-bottom: none; }
    .channel-name { font-weight: 500; font-size: 0.9rem; }
    .balance {
      text-align: right;
      font-variant-numeric: tabular-nums;
      cursor: pointer;
      font-size: 0.9rem;
    }
    td.balance:hover { color: #fff; }
    td.balance.selected { color: #4caf50; }
    .delta-positive { color: #4caf50 !important; }
    .delta-negative { color: #f44336 !important; }

    .chart-box {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 0.5rem;
      padding: 0.75rem 1rem;
      margin-top: 0.75rem;
    }
    .chart-box h2 {
      font-size: 0.8rem;
      font-weight: 500;
      color: #999;
      margin-bottom: 0.5rem;
    }
    .chart-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-bottom: 0.65rem;
    }
    .range-btn {
      background: #161616;
      border: 1px solid #333;
      color: #aaa;
      padding: 0.25rem 0.65rem;
      border-radius: 0.35rem;
      cursor: pointer;
      font-size: 0.75rem;
      transition: background 0.15s, border-color 0.15s;
    }
    .range-btn:hover { background: #222; border-color: #555; }
    .range-btn.active {
      background: #2a2a2a;
      border-color: #4caf50;
      color: #e0e0e0;
    }
    .chart-wrap {
      position: relative;
      height: 180px;
    }
    .chart-empty {
      font-size: 0.8rem;
      color: #555;
      padding: 1rem 0;
    }
    .status {
      font-size: 0.75rem;
      color: #555;
      margin-top: 0.75rem;
      text-align: right;
    }

    @media (max-width: 480px) {
      .chart-wrap { height: 140px; }
      th, td { padding: 0.45rem 0.55rem; font-size: 0.82rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav><a href="/">&larr; AutoLab</a></nav>
    <h1>StreamElements Balances</h1>

    <div class="table-box">
      <table>
        <thead>
          <tr>
            <th>Channel</th>
            {% for b in bettors %}<th class="balance">{{ b }}</th>{% endfor %}
          </tr>
        </thead>
        <tbody>
          {% for channel, cells in rows %}
          <tr>
            <td class="channel-name">{{ channel }}</td>
            {% for bettor, balance in cells %}
            <td class="balance" data-channel="{{ channel }}" data-bettor="{{ bettor }}">{{ balance }}</td>
            {% endfor %}
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>

    <div class="chart-box" id="chart-panel" style="display:none;">
      <h2 id="chart-title"></h2>
      <div class="chart-controls" id="chart-controls" style="display:none;">
        <button type="button" class="range-btn" data-days="7">7 d</button>
        <button type="button" class="range-btn" data-days="30">30 d</button>
        <button type="button" class="range-btn" data-days="90">90 d</button>
        <button type="button" class="range-btn" data-days="180">6 mo</button>
        <button type="button" class="range-btn active" data-days="">All</button>
      </div>
      <div class="chart-wrap" id="chart-wrap">
        <canvas id="chart"></canvas>
      </div>
      <p class="chart-empty" id="chart-empty" style="display:none;">No history yet for this balance.</p>
    </div>

    <p class="status" id="status">Loading fresh data&hellip;</p>
  </div>

  <script>
    (function () {
      var chartPanel = document.getElementById('chart-panel');
      var chartWrap  = document.getElementById('chart-wrap');
      var chartTitle = document.getElementById('chart-title');
      var chartEmpty = document.getElementById('chart-empty');
      var elStatus   = document.getElementById('status');
      var balanceChart = null;
      var selectedCell = null;
      var historyDays = null;
      var selectedChannel = null;
      var selectedBettor = null;

      var gridColor = 'rgba(255,255,255,0.06)';
      var tickColor = '#888';

      function ensureChart() {
        if (balanceChart) return balanceChart;
        balanceChart = new Chart(document.getElementById('chart'), {
          type: 'line',
          data: {
            datasets: [{
              borderColor: '#4caf50',
              backgroundColor: '#4caf5018',
              borderWidth: 1.5,
              pointRadius: 0,
              fill: true,
              tension: 0.25,
              data: []
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            interaction: { intersect: false, mode: 'index' },
            scales: {
              x: {
                type: 'time',
                time: {
                  tooltipFormat: 'yyyy-MM-dd HH:mm',
                  displayFormats: {
                    second: 'HH:mm:ss',
                    minute: 'HH:mm',
                    hour: 'HH:mm',
                    day: 'MMM d',
                    week: 'MMM d',
                    month: 'MMM yyyy',
                    quarter: 'MMM yyyy',
                    year: 'yyyy'
                  }
                },
                grid: { color: gridColor },
                ticks: { color: tickColor, maxTicksLimit: 8, font: { size: 10 } }
              },
              y: {
                grid: { color: gridColor },
                ticks: { color: tickColor, font: { size: 10 } }
              }
            },
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: function (ctx) {
                    return ctx.parsed.y != null ? ctx.parsed.y.toLocaleString() : '';
                  }
                }
              }
            }
          }
        });
        return balanceChart;
      }

      function loadHistory(channel, bettor) {
        selectedChannel = channel;
        selectedBettor = bettor;
        var q = 'channel=' + encodeURIComponent(channel) + '&bettor=' + encodeURIComponent(bettor);
        if (historyDays != null && historyDays > 0) {
          q += '&days=' + historyDays;
        }
        fetch('/api/balance_history?' + q)
          .then(function (r) { return r.json(); })
          .then(function (data) {
            if (!data.points || !data.points.length) {
              if (balanceChart) {
                balanceChart.data.datasets[0].data = [];
                balanceChart.update();
              }
              chartWrap.style.display = 'none';
              chartTitle.textContent = channel + ' \u2014 ' + bettor;
              chartEmpty.style.display = 'block';
              document.getElementById('chart-controls').style.display = 'flex';
              chartPanel.style.display = 'block';
              return;
            }
            chartEmpty.style.display = 'none';
            chartWrap.style.display = 'block';
            document.getElementById('chart-controls').style.display = 'flex';

            var chart = ensureChart();
            chart.data.datasets[0].data = data.points
              .filter(function (p) { return p.balance != null; })
              .map(function (p) { return { x: new Date(p.updated_at), y: p.balance }; });
            chart.update();

            chartTitle.textContent = channel + ' \u2014 ' + bettor;
            chartPanel.style.display = 'block';
          })
          .catch(function () {});
      }

      function attachCellClickHandlers() {
        document.querySelectorAll('td.balance[data-channel][data-bettor]').forEach(function (td) {
          if (td.getAttribute('data-bound') === '1') return;
          td.setAttribute('data-bound', '1');
          td.addEventListener('click', function () {
            if (selectedCell) selectedCell.classList.remove('selected');
            td.classList.add('selected');
            selectedCell = td;
            loadHistory(td.getAttribute('data-channel'), td.getAttribute('data-bettor'));
          });
        });
      }

      fetch('/api/balances')
        .then(function (r) { return r.json(); })
        .then(function (data) {
          data.rows.forEach(function (row) {
            row.cells.forEach(function (cell) {
              var td = document.querySelector(
                'td[data-channel="' + row.channel + '"][data-bettor="' + cell.bettor + '"]'
              );
              if (td) {
                var oldText = td.textContent.trim();
                var oldVal = parseInt(oldText.replace(/[^0-9\-]/g, ''), 10);
                var newVal = cell.balance;
                var content = String(newVal);
                td.classList.remove('delta-positive', 'delta-negative');
                if (!isNaN(oldVal) && typeof newVal === 'number') {
                  var delta = newVal - oldVal;
                  if (delta > 0) {
                    content = newVal + ' (+' + delta + ')';
                    td.classList.add('delta-positive');
                  } else if (delta < 0) {
                    content = newVal + ' (' + delta + ')';
                    td.classList.add('delta-negative');
                  }
                }
                td.textContent = content;
              }
            });
          });
          elStatus.textContent = 'Updated with live data.';
          attachCellClickHandlers();
        })
        .catch(function () { elStatus.textContent = 'Update failed.'; });

      document.querySelectorAll('#chart-controls .range-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          document.querySelectorAll('#chart-controls .range-btn').forEach(function (b) { b.classList.remove('active'); });
          btn.classList.add('active');
          var d = btn.getAttribute('data-days');
          historyDays = d ? parseInt(d, 10) : null;
          if (selectedChannel && selectedBettor) {
            loadHistory(selectedChannel, selectedBettor);
          }
        });
      });

      attachCellClickHandlers();
    })();
  </script>
</body>
</html>
