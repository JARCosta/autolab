<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoLab — Balances</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 1.5rem; background: #1a1a1a; color: #e0e0e0; }
    h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 1rem; }
    table { border-collapse: collapse; width: 100%; max-width: 32rem; }
    th, td { border: 1px solid #444; padding: 0.5rem 0.75rem; text-align: left; }
    th { background: #2a2a2a; font-weight: 600; }
    tr:nth-child(even) { background: #222; }
    .balance { text-align: right; font-variant-numeric: tabular-nums; cursor: pointer; }
    .meta { margin-top: 0.75rem; font-size: 0.875rem; color: #888; }
    .delta-positive { color: #4caf50; }
    .delta-negative { color: #f44336; }
    .chart-panel {
      margin-top: 1.25rem;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      background: #111;
      border: 1px solid #333;
    }
    .chart-panel h2 {
      margin: 0 0 0.5rem;
      font-size: 0.95rem;
      font-weight: 500;
    }
    .chart-empty {
      font-size: 0.875rem;
      color: #777;
    }
    /* Keep the SVG aspect ratio while allowing it to shrink on small screens */
    #chart {
      display: block;
      width: 100%;
      max-width: 320px;
      height: auto;
    }
  </style>
</head>
<body>
  <h1>StreamElements balances</h1>
  <table>
    <thead>
      <tr>
        <th>Channel</th>
        {% for b in bettors %}<th class="balance">{{ b }}</th>{% endfor %}
      </tr>
    </thead>
    <tbody>
      {% for channel, cells in rows %}
      <tr>
        <td>{{ channel }}</td>
        {% for bettor, balance in cells %}
        <td class="balance" data-channel="{{ channel }}" data-bettor="{{ bettor }}">{{ balance }}</td>
        {% endfor %}
      </tr>
      {% endfor %}
    </tbody>
  </table>
  <p class="meta" id="meta">Loading fresh data…</p>
  <div class="chart-panel" id="chart-panel" style="display:none;">
    <h2 id="chart-title"></h2>
    <svg id="chart" width="320" height="160" viewBox="0 0 320 160" preserveAspectRatio="xMidYMid meet"></svg>
    <p class="chart-empty" id="chart-empty" style="display:none;">No history yet for this balance.</p>
  </div>
  <script>
    (function () {
      var meta = document.getElementById('meta');
      var chartPanel = document.getElementById('chart-panel');
      var chartSvg = document.getElementById('chart');
      var chartTitle = document.getElementById('chart-title');
      var chartEmpty = document.getElementById('chart-empty');

      function setMeta(text) { if (meta) meta.textContent = text; }

      function attachCellClickHandlers() {
        var cells = document.querySelectorAll('td.balance[data-channel][data-bettor]');
        cells.forEach(function (td) {
          if (td.getAttribute('data-chart-bound') === '1') return;
          td.setAttribute('data-chart-bound', '1');
          td.addEventListener('click', function () {
            var channel = td.getAttribute('data-channel');
            var bettor = td.getAttribute('data-bettor');
            if (!channel || !bettor) return;
            fetch('/api/balance_history?channel=' + encodeURIComponent(channel) + '&bettor=' + encodeURIComponent(bettor))
              .then(function (r) { return r.json(); })
              .then(function (data) {
                if (!data.points || !data.points.length) {
                  chartSvg.innerHTML = '';
                  chartTitle.textContent = channel + ' — ' + bettor;
                  chartEmpty.style.display = 'block';
                  chartPanel.style.display = 'block';
                  return;
                }
                chartEmpty.style.display = 'none';
                var points = data.points;
                var balances = points.map(function (p) { return p.balance; });
                var minBal = Math.min.apply(null, balances);
                var maxBal = Math.max.apply(null, balances);
                if (minBal === maxBal) {
                  // Avoid flat line at edge
                  minBal -= 1;
                  maxBal += 1;
                }
                var w = 320;
                var h = 160;
                var margin = { left: 44, right: 10, top: 10, bottom: 22 };
                var plotW = w - margin.left - margin.right;
                var plotH = h - margin.top - margin.bottom;
                var stepX = points.length > 1 ? plotW / (points.length - 1) : 0;
                chartSvg.setAttribute('viewBox', '0 0 ' + w + ' ' + h);
                chartSvg.innerHTML = '';

                var coords = points.map(function (p, idx) {
                  var x = margin.left + (points.length === 1 ? plotW / 2 : stepX * idx);
                  var y = margin.top + (plotH - ((p.balance - minBal) / (maxBal - minBal)) * plotH);
                  return { x: x, y: y };
                });

                function svgEl(name, attrs, text) {
                  var el = document.createElementNS('http://www.w3.org/2000/svg', name);
                  if (attrs) Object.keys(attrs).forEach(function (k) { el.setAttribute(k, String(attrs[k])); });
                  if (typeof text === 'string') el.textContent = text;
                  return el;
                }

                function pad2(n) { return (n < 10 ? '0' : '') + n; }

                function parseIsoUtc(iso) {
                  // Expects something like "2026-03-16T21:10:00Z"
                  if (!iso || typeof iso !== 'string') return null;
                  var d = new Date(iso);
                  return isNaN(d.getTime()) ? null : d;
                }

                function fmtDateUtc(d) {
                  return d.getUTCFullYear() + '-' + pad2(d.getUTCMonth() + 1) + '-' + pad2(d.getUTCDate());
                }

                function fmtDateTimeUtc(d) {
                  return fmtDateUtc(d) + ' ' + pad2(d.getUTCHours()) + ':' + pad2(d.getUTCMinutes());
                }

                // Axes
                var axisColor = '#555';
                var labelColor = '#999';
                chartSvg.appendChild(svgEl('line', {
                  x1: margin.left, y1: margin.top,
                  x2: margin.left, y2: margin.top + plotH,
                  stroke: axisColor, 'stroke-width': 1
                }));
                chartSvg.appendChild(svgEl('line', {
                  x1: margin.left, y1: margin.top + plotH,
                  x2: margin.left + plotW, y2: margin.top + plotH,
                  stroke: axisColor, 'stroke-width': 1
                }));

                function yForBal(bal) {
                  return margin.top + (plotH - ((bal - minBal) / (maxBal - minBal)) * plotH);
                }

                var ticks = [
                  { v: minBal, label: String(minBal) },
                  { v: Math.round((minBal + maxBal) / 2), label: String(Math.round((minBal + maxBal) / 2)) },
                  { v: maxBal, label: String(maxBal) }
                ];
                ticks.forEach(function (t) {
                  var yy = yForBal(t.v);
                  chartSvg.appendChild(svgEl('line', {
                    x1: margin.left - 4, y1: yy,
                    x2: margin.left, y2: yy,
                    stroke: axisColor, 'stroke-width': 1
                  }));
                  chartSvg.appendChild(svgEl('text', {
                    x: margin.left - 6, y: yy + 3,
                    fill: labelColor,
                    'font-size': 10,
                    'text-anchor': 'end'
                  }, t.label));
                });

                // X labels (first/last) as actual dates/times (UTC)
                var firstD = parseIsoUtc(points[0].updated_at);
                var lastD = parseIsoUtc(points[points.length - 1].updated_at);
                var firstT = '';
                var lastT = '';
                if (firstD && lastD) {
                  var spanMs = Math.abs(lastD.getTime() - firstD.getTime());
                  var oneDayMs = 24 * 60 * 60 * 1000;
                  if (spanMs >= oneDayMs) {
                    firstT = fmtDateUtc(firstD);
                    lastT = fmtDateUtc(lastD);
                  } else {
                    firstT = fmtDateTimeUtc(firstD);
                    lastT = fmtDateTimeUtc(lastD);
                  }
                } else {
                  // Fallback: show raw strings if parsing fails
                  firstT = String(points[0].updated_at || '');
                  lastT = String(points[points.length - 1].updated_at || '');
                }
                chartSvg.appendChild(svgEl('text', {
                  x: margin.left, y: margin.top + plotH + 16,
                  fill: labelColor,
                  'font-size': 10,
                  'text-anchor': 'start'
                }, firstT));
                chartSvg.appendChild(svgEl('text', {
                  x: margin.left + plotW, y: margin.top + plotH + 16,
                  fill: labelColor,
                  'font-size': 10,
                  'text-anchor': 'end'
                }, lastT));

                if (coords.length > 1) {
                  var poly = svgEl('polyline', {
                    fill: 'none',
                    stroke: '#4caf50',
                    'stroke-width': 2,
                    points: coords.map(function (c) { return c.x + ',' + c.y; }).join(' ')
                  });
                  chartSvg.appendChild(poly);
                } else {
                  // Single point: draw a dot so it’s visible.
                  chartSvg.appendChild(svgEl('circle', {
                    cx: coords[0].x, cy: coords[0].y, r: 3.5, fill: '#4caf50'
                  }));
                }
                chartTitle.textContent = channel + ' — ' + bettor;
                chartPanel.style.display = 'block';
              })
              .catch(function () {
                // Keep silent, chart just won't update
              });
          });
        });
      }

      fetch('/api/balances')
        .then(function (r) { return r.json(); })
        .then(function (data) {
          data.rows.forEach(function (row) {
            row.cells.forEach(function (cell) {
              var td = document.querySelector(
                'td[data-channel="' + row.channel + '"][data-bettor="' + cell.bettor + '"]'
              );
              if (td) {
                var oldText = td.textContent.trim();
                var oldVal = parseInt(oldText.replace(/[^0-9\-]/g, ''), 10);
                var newVal = cell.balance;
                var content = String(newVal);
                td.classList.remove('delta-positive', 'delta-negative');
                if (!isNaN(oldVal) && typeof newVal === 'number') {
                  var delta = newVal - oldVal;
                  if (delta > 0) {
                    content = newVal + ' (+' + delta + ')';
                    td.classList.add('delta-positive');
                  } else if (delta < 0) {
                    content = newVal + ' (' + delta + ')';
                    td.classList.add('delta-negative');
                  }
                }
                td.textContent = content;
              }
            });
          });
          setMeta('Updated with live data.');
          attachCellClickHandlers();
        })
        .catch(function () { setMeta('Update failed.'); });

      // Attach handlers to initial cached table as well
      attachCellClickHandlers();
    })();
  </script>
</body>
</html>
