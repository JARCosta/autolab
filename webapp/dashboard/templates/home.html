<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoLab</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
    }
    .container {
      max-width: 560px;
      margin: 0 auto;
      padding: 4rem 1.5rem;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.35rem;
    }
    .subtitle {
      color: #666;
      font-size: 0.85rem;
      margin-bottom: 2.25rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 0.75rem;
    }
    .card {
      display: block;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 0.6rem;
      padding: 1.25rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, background 0.15s;
    }
    .card:hover {
      border-color: #555;
      background: #1f1f1f;
    }
    .card-icon {
      width: 2rem;
      height: 2rem;
      border-radius: 0.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      margin-bottom: 0.75rem;
    }
    .card-icon.green { background: rgba(76, 175, 80, 0.15); color: #4caf50; }
    .card-icon.blue  { background: rgba(66, 165, 245, 0.15); color: #42a5f5; }
    .card-title {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }
    .card-desc {
      font-size: 0.78rem;
      color: #888;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>AutoLab</h1>
    <p class="subtitle">Dashboard &amp; monitoring</p>
    <div class="grid">
      <a class="card" href="/balances">
        <div class="card-icon green">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M1 12L5 6L9 9L15 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="card-title">StreamElements Balances</div>
        <div class="card-desc">Track bettor balances and history across Twitch channels.</div>
      </a>
      <a class="card" href="/monitor">
        <div class="card-icon blue">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="1" y="3" width="14" height="10" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
            <path d="M4 9L6 7L8 8.5L12 5.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="card-title">Hardware Monitor</div>
        <div class="card-desc">CPU load, clock speed, and temperature over time.</div>
      </a>
    </div>
  </div>
</body>
</html>
