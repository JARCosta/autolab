<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamElements - Balances</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/luxon@3/build/global/luxon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1"></script>
  <link rel="stylesheet" href="{{ url_for('streamelements.static', filename='streamelements.css', v=asset_version) }}">
</head>
<body>
  <div class="container">
    <nav><a href="/">&larr; Home</a></nav>
    <h1>StreamElements Balances</h1>

    <div class="table-box">
      <table>
        <thead>
          <tr>
            <th>Channel</th>
            {% for b in bettors %}<th class="balance">{{ b }}</th>{% endfor %}
          </tr>
        </thead>
        <tbody>
          {% for channel, cells in rows %}
          <tr>
            <td class="channel-name">{{ channel }}</td>
            {% for bettor, balance in cells %}
            <td class="balance" data-channel="{{ channel }}" data-bettor="{{ bettor }}">{{ balance }}</td>
            {% endfor %}
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>

    <div class="chart-box is-hidden" id="chart-panel">
      <h2 id="chart-title"></h2>
      <div class="chart-controls is-hidden" id="chart-controls">
        <button type="button" class="range-btn" data-days="7">7 d</button>
        <button type="button" class="range-btn" data-days="30">30 d</button>
        <button type="button" class="range-btn" data-days="90">90 d</button>
        <button type="button" class="range-btn" data-days="180">6 mo</button>
        <button type="button" class="range-btn active" data-days="">All</button>
      </div>
      <div class="chart-wrap" id="chart-wrap">
        <canvas id="chart"></canvas>
      </div>
      <p class="chart-empty is-hidden" id="chart-empty">No history yet for this balance.</p>
    </div>

    <p class="status" id="status">Loading fresh data&hellip;</p>
  </div>

  <script src="{{ url_for('streamelements.static', filename='streamelements.js', v=asset_version) }}"></script>
</body>
</html>
